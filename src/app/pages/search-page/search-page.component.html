<div class="search-page">

  <!-- 🔸 Левая часть — результаты -->
  <div class="search-results">
    @if (books?.length === 0) {
      <div>Ничего не найдено</div>
    }

    @for (book of books; track book.bookId) {
      <app-book-card [book]="book"></app-book-card>
    }
  </div>

  <!-- 🔸 Правая часть — фильтры -->
  <div class="search-filters">

    <h3>Поиск</h3>

    <!-- поиск по названию -->
    <input
      type="text"
      class="login-input"
      placeholder="Название книги..."
      [(ngModel)]="searchQuery"
    />

    <!-- теги -->
    <div class="filter-block">
      <div class="filter-title">Теги</div>

      @for (tag of allTags; track tag.tagId) {
        <label class="tag-option">
          <input
            type="checkbox"
            [value]="tag.tagId"
            (change)="onTagToggle(tag.tagId, $event)"
          />
          {{ tag.tagName }}
        </label>
      }
    </div>

    <button class="btn" (click)="applyFilters()">
      Найти
    </button>

  </div>

</div>
